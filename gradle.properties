# Project-wide Gradle settings.
# IDE (e.g. Android Studio) users:
# Gradle settings configured through the IDE *will override*
# any settings specified in this file.
# For more details on how to configure your build environment visit
# http://www.gradle.org/docs/current/userguide/build_environment.html
# Aumentar memoria para la compilacion (Aceleracion)
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8

# Compilar multiples modulos al mismo tiempo
org.gradle.parallel=true

# Guardar configuraciones en cache para no repetir procesos
org.gradle.caching=true
org.gradle.configuration-cache=true

# Kotlin code style for this project: "official" or "obsolete":
kotlin.code.style=official

# Esta propiedad es necesaria para evitar el error de configuracion en AGP 9+ 
# al usar plugins como KSP que inyectan sourcesets de Kotlin. 
# Aunque es experimental, es la solucion oficial recomendada por el mensaje de error.
android.disallowKotlinSourceSets=false